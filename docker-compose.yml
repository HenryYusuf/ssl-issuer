services:
  ssl-issuer:
    build: .
    container_name: ssl-issuer
    restart: unless-stopped
    ports:
      - '3001:3000'
    volumes:
      - /opt/docker/ssl-issuer:/app/storage
    environment:
      - NODE_ENV=production
      - HOST=0.0.0.0
      - PORT=3000

volumes:
  ssl_storage:
    driver: local
